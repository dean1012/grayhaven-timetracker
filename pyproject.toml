[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "PERF", "RUF", "S", "SIM", "UP"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S107", "S108"]

[tool.coverage.run]
branch = true
source = ["grayhaven_timetracker", "scripts"]

[tool.coverage.report]
fail_under = 90
omit = ["tests/*"]
show_missing = true

[tool.mypy]
plugins = ["sqlalchemy.ext.mypy.plugin"]

[[tool.mypy.overrides]]
module = [
  "flask_wtf.*",
  "qrcode",
  "reportlab.*",
  "sqlcipher3.*",
]
ignore_missing_imports = true
