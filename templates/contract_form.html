{% extends "base.html" %}
{% block title %}Add contract · Grayhaven Systems LLC Time Tracker{% endblock %}
{% block content %}<section class="narrow-content"><a class="back-link" href="{{ url_for('main.client', client_id=client.id) }}"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to client</a><div class="panel form-panel"><p class="eyebrow">{{ client.name|upper }}</p><h1>Add contract</h1><form method="post" class="form-stack"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>Contract name<input name="name" maxlength="200" required autofocus></label><label>Contract contact name<input name="contact_name" maxlength="200" required></label><label>Contract contact email<input type="email" name="contact_email" maxlength="255" required></label><label>Billable hourly rate<input type="number" name="hourly_rate" min="0" max="1000000" step="0.01" required></label><div class="form-actions"><a class="button button-secondary" href="{{ url_for('main.client', client_id=client.id) }}">Cancel</a><button class="button button-primary" type="submit"><i class="fa-solid fa-check" aria-hidden="true"></i> Save contract</button></div></form></div></section>{% endblock %}
