{% extends "base.html" %}
{% block title %}Sign in · Grayhaven Systems LLC Time Tracker{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-panel panel">
    <img class="auth-logo" src="{{ url_for('main.branding_asset', filename='grayhaven-logo-wordmark-dark.svg') }}" alt="Grayhaven Systems LLC">
    <p class="eyebrow">SECURE WORK SESSION MANAGEMENT</p>
    <h1>Sign in to Time Tracker</h1>
    <p class="muted">Track contract work with clarity and confidence.</p>
    <form method="post" class="form-stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Email address<input type="email" name="email" autocomplete="username" maxlength="255" required autofocus></label>
      <label>Password<input type="password" name="password" autocomplete="current-password" maxlength="1024" required></label>
      <label>Authenticator code <span class="optional">if enabled</span><input type="text" name="totp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9 ]{6,7}" maxlength="7"></label>
      <button class="button button-primary" type="submit"><i class="fa-solid fa-arrow-right-to-bracket" aria-hidden="true"></i> Sign in</button>
    </form>
  </div>
</section>
{% endblock %}
