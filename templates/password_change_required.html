{% extends "base.html" %}
{% block title %}Change password · Grayhaven Systems LLC Time Tracker{% endblock %}
{% block content %}
<section class="narrow-content">
  <div class="panel form-panel">
    <p class="eyebrow">PASSWORD CHANGE REQUIRED</p>
    <h1>Choose a permanent password</h1>
    <p class="muted">Your temporary password was accepted. Replace it before continuing to the application.</p>
    <form method="post" action="{{ url_for('main.change_password') }}" class="form-stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Temporary password<input type="password" name="current_password" maxlength="1024" required autocomplete="current-password" autofocus></label>
      <label>New password<input type="password" name="new_password" minlength="32" maxlength="1024" required autocomplete="new-password"><small>At least 32 characters with uppercase, lowercase, number, and special character.</small></label>
      <label>Confirm new password<input type="password" name="confirm_password" minlength="32" maxlength="1024" required autocomplete="new-password"></label>
      <div class="form-actions"><button class="button button-primary" type="submit"><i class="fa-solid fa-key" aria-hidden="true"></i> Set password and continue</button></div>
    </form>
  </div>
</section>
{% endblock %}
