{% extends "base.html" %}
{% block title %}Confirm sensitive action · Grayhaven Systems LLC Time Tracker{% endblock %}
{% block content %}
<section class="narrow-content">
  <a class="back-link" href="{{ cancel_url }}"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Cancel</a>
  <div class="panel form-panel">
    <p class="eyebrow">{{ eyebrow }}</p>
    <h1>{{ title }}</h1>
    <p class="muted">{{ description }}</p>
    <p class="muted">Re-enter your password to continue.</p>
    <form method="post" class="form-stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Current Password<input type="password" name="current_password" maxlength="1024" required autocomplete="current-password" autofocus></label>
      {% if totp_required %}<label>Authenticator Code<input name="totp" inputmode="numeric" pattern="[0-9 ]{6,7}" maxlength="7" required autocomplete="off" data-protonpass-ignore="true"></label>{% endif %}
      <div class="form-actions"><a class="button button-secondary" href="{{ cancel_url }}">Cancel</a><button class="button button-primary" type="submit"><i class="fa-solid fa-shield-halved" aria-hidden="true"></i> {{ submit_label }}</button></div>
    </form>
  </div>
</section>
{% endblock %}
