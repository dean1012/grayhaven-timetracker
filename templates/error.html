{% extends "base.html" %}
{% block title %}Error {{ status }} · Grayhaven Systems LLC Time Tracker{% endblock %}
{% block content %}<section class="error-state panel"><p class="eyebrow">ERROR {{ status }}</p><h1>Unable to Complete the Request</h1><p class="muted">{{ message }}</p><a class="button button-primary" href="{{ url_for('main.dashboard') if logged_user else url_for('main.login') }}">Return to {{ 'Dashboard' if logged_user else 'Sign In' }}</a></section>{% endblock %}
