{% extends "base.html" %}
{% block title %}Add client · Grayhaven Systems LLC Time Tracker{% endblock %}
{% block content %}<section class="narrow-content"><a class="back-link" href="{{ url_for('main.dashboard') }}"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to dashboard</a><div class="panel form-panel"><p class="eyebrow">CLIENT MANAGEMENT</p><h1>Add client</h1><p class="muted">Contact details remain internal and are not included in reports.</p><form method="post" class="form-stack"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>Client name<input name="name" maxlength="200" required autofocus></label><label>Contact name<input name="contact_name" maxlength="200" required></label><label>Contact email<input type="email" name="contact_email" maxlength="255" required></label><div class="form-actions"><a class="button button-secondary" href="{{ url_for('main.dashboard') }}">Cancel</a><button class="button button-primary" type="submit"><i class="fa-solid fa-check" aria-hidden="true"></i> Save client</button></div></form></div></section>{% endblock %}
