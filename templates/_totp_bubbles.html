<fieldset class="totp-fieldset">
  <legend><i class="fa-solid fa-shield-halved" aria-hidden="true"></i> Authenticator Code</legend>
  <div class="totp-bubbles" data-totp-bubbles>
    {% for digit in range(1, 7) %}<input type="text" name="totp_digit" inputmode="numeric" pattern="{% if digit == 1 %}[0-9]{1,6}{% else %}[0-9]{1}{% endif %}" maxlength="{{ 6 if digit == 1 else 1 }}" required {% if digit == 1 %}autocomplete="one-time-code" autofocus{% else %}autocomplete="off"{% endif %} data-protonpass-ignore="true" aria-label="Authenticator code digit {{ digit }}">{% endfor %}
  </div>
</fieldset>
