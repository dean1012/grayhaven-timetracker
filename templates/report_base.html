<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1C1F24">
  <meta name="robots" content="noindex, nofollow">
  <title>{% block title %}Grayhaven Systems LLC - Contract Time Report{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('main.branding_asset', filename='favicon.ico') }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}?v={{ app_version }}">
