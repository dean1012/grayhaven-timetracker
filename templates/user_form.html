{% extends "base.html" %}
{% block title %}Add user · Grayhaven Systems LLC Time Tracker{% endblock %}
{% block content %}<section class="narrow-content"><a class="back-link" href="{{ url_for('users') }}"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to users</a><div class="panel form-panel"><p class="eyebrow">ACCESS MANAGEMENT</p><h1>Add user</h1><p class="muted">A TOTP secret will be generated for the user after creation.</p><form method="post" class="form-stack"><label>First name<input name="first_name" required autofocus></label><label>Last name<input name="last_name" required></label><label>Email address<input type="email" name="email" required></label><label>Initial password<input type="password" name="password" minlength="32" required><small>At least 32 characters with uppercase, lowercase, number, and special character.</small></label><div class="form-actions"><a class="button button-secondary" href="{{ url_for('users') }}">Cancel</a><button class="button button-primary" type="submit"><i class="fa-solid fa-user-plus" aria-hidden="true"></i> Create user</button></div></form></div></section>{% endblock %}
