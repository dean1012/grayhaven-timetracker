{% extends "base.html" %}
{% block title %}Add user · Grayhaven Systems LLC Time Tracker{% endblock %}
{% block content %}<section class="narrow-content"><a class="back-link" href="{{ url_for('main.users') }}"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to users</a><div class="panel form-panel"><p class="eyebrow">ACCESS MANAGEMENT</p><h1>Add user</h1><p class="muted">The account is created as a standard user with two-factor authentication enabled.</p><form method="post" class="form-stack"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>First name<input name="first_name" maxlength="100" required autofocus></label><label>Last name<input name="last_name" maxlength="100" required></label><label>Email address<input type="email" name="email" maxlength="255" required></label><label>Initial password<input type="password" name="password" minlength="32" maxlength="1024" required><small>At least 32 characters with uppercase, lowercase, number, and special character.</small></label><div class="form-actions"><a class="button button-secondary" href="{{ url_for('main.users') }}">Cancel</a><button class="button button-primary" type="submit"><i class="fa-solid fa-user-plus" aria-hidden="true"></i> Create user</button></div></form></div></section>{% endblock %}
