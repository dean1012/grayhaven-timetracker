name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Audit Python dependencies
        run: |
          python -m pip_audit --progress-spinner off -r requirements.txt

      - name: Compile Python sources
        run: |
          python -m compileall -q grayhaven_timetracker scripts tests

      - name: Mypy type check
        run: |
          mypy --strict grayhaven_timetracker scripts tests

      - name: Ruff lint
        run: |
          ruff check grayhaven_timetracker scripts tests

      - name: Ruff format check
        run: |
          ruff format --check grayhaven_timetracker scripts tests

      - name: Run actionlint
        uses: devops-actions/actionlint@5b8e487739690fe67cb3bd38471d2abfd34daff3  # v0.1.12

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca  # master
        with:
          version: v0.11.0
          additional_files: scripts/build-image

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Build container image
        run: docker build --build-arg APP_VERSION=ci-validation --tag grayhaven-timetracker:ci .

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23
